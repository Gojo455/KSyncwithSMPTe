name: Fetch Movies from TMDB

# Run manually from the Actions tab whenever you want to add new movies.
# You can also change the number below (50) to fetch more or fewer films.
on:
  workflow_dispatch:
    inputs:
      movie_count:
        description: 'How many new movies to fetch from TMDB'
        required: true
        default: '50'

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Fetch and insert movies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python fix_posters.py --fetch ${{ github.event.inputs.movie_count }} --apply
